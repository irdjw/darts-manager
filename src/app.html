<!DOCTYPE html>
<html lang="en" data-theme="isaac-wilson">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />
    
    <!-- Simple, reliable viewport for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="format-detection" content="telephone=no" />
    
    <meta name="theme-color" content="#1e40af" />
    <meta name="description" content="Professional darts team management system for Isaac Wilson Darts Team" />
    
    <!-- Preload critical fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Progressive Web App -->
    <link rel="manifest" href="%sveltekit.assets%/manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Isaac Wilson Darts">
    
    <!-- Simple mobile CSS -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        position: fixed;
        -webkit-text-size-adjust: 100%;
      }
      
      #svelte {
        height: 100vh;
        width: 100vw;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
    </style>
    
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-slate-50">
    <div id="svelte" style="display: contents">%sveltekit.body%</div>
  </body>
</html>
